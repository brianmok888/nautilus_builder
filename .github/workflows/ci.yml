name: Nautilus Builder CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked

      - name: Ruff check
        run: uv run ruff check .

      - name: Compile check
        run: uv run python -m compileall packages services scripts

      - name: Pytest
        run: uv run pytest

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  repo-hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No tracked generated/cache artifacts
        run: |
          for path in \
            node_modules \
            .vite \
            .vitest \
            .next \
            dist \
            build \
            .pytest_cache \
            .ruff_cache \
            .mypy_cache \
            htmlcov \
            test-results \
            playwright-report
          do
            if git ls-files | grep -qE "(^|/)$path(/|$)"; then
              echo "::error::Forbidden generated/cache artifact is tracked: $path"
              git ls-files | grep -E "(^|/)$path(/|$)"
              exit 1
            fi
          done
          echo "No forbidden tracked artifacts found."

  forbidden-terms:
    name: Frontend safety terms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No forbidden live-trading wording
        run: |
          cd apps/web
          # Forbidden positive/actionable wording (safety disclaimers are allowed)
          hits=$(grep -Rn \
            "Start live trading\|live trading enabled\|Auto execute\|Guaranteed profit\|Auto trade now" \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
            . || true)
          if [ -n "$hits" ]; then
            echo "::error::Forbidden wording found in frontend:"
            echo "$hits"
            exit 1
          fi
          echo "No forbidden wording found."

      - name: No TradeAction creation in frontend
        run: |
          cd apps/web
          hits=$(grep -Rn \
            "new TradeAction\|TradeAction(" \
            --include='*.ts' --include='*.tsx' \
            . | grep -v "blocked\|forbidden\|unsupported" || true)
          if [ -n "$hits" ]; then
            echo "::error::TradeAction creation found in frontend:"
            echo "$hits"
            exit 1
          fi
          echo "No TradeAction creation found."
