name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for forbidden committed artifacts
        run: bash scripts/check_repo_hygiene.sh
      - name: Check for forbidden authority patterns
        run: bash scripts/check_forbidden_authority.sh

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install ruff
      - name: Ruff lint
        run: ruff check packages services tests

  python-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .[test]
      - name: Compile check
        run: python -m compileall -q packages services tests
      - name: Check pinned NautilusTrader runtime
        run: |
          python - <<'PY'
          from packages.backtest_runner.runtime_check import check_nautilus_runtime_version
          status = check_nautilus_runtime_version()
          if not status.is_match:
              raise SystemExit(status.message)
          PY
      - name: Strategy spec suite
        run: pytest tests/strategy_spec -q --tb=short
      - name: Workflow spine suite
        run: pytest tests/workflow_spine -q --tb=short
      - name: Artifact store suite
        run: pytest tests/artifact_store -q --tb=short
      - name: Catalog datasets suite
        run: pytest tests/catalog_datasets -q --tb=short
      - name: Full test suite
        run: pytest tests/ -q --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - working-directory: apps/web
        run: npm ci
      - working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - working-directory: apps/web
        run: npm run typecheck
      - working-directory: apps/web
        run: npm test
      - working-directory: apps/web
        run: npm run build
      - working-directory: apps/web
        run: npm run test:e2e

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API Docker image
        run: docker build -f Dockerfile.api -t nautilus-builder-api:test .
      - name: Build Web Docker image
        run: docker build -f apps/web/Dockerfile -t nautilus-builder-web:test apps/web/
