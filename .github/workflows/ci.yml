name: CI

on:
  push:
    branches: [master, main, "feat/*"]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install ruff>=0.15
      - name: Lint (ruff)
        run: ruff check packages services

      - name: Compile check
        run: python3 -m compileall -q packages services tests scripts

      - name: Run backend tests
        run: python3 -m pytest tests/ -q --tb=line

  safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run forbidden authority scan
        run: bash scripts/check_forbidden_authority.sh

      - name: Run hygiene tests
        run: python3 -m pytest tests/hygiene -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api .

      - name: Validate dev compose config
        run: docker compose -f docker-compose.dev.yml config
