name: Security

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  authority-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run forbidden authority scan
        run: bash scripts/check_forbidden_authority.sh

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in env examples
        run: python3 scripts/check_secrets.sh

      - name: Check release version consistency
        run: python3 scripts/check_release_version.py

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run hygiene tests
        run: python3 -m pytest tests/hygiene -q
