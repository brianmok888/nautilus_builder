name: test

on:
  push:
  pull_request:

jobs:
  python-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .[test]
      - run: >-
          pytest tests/strategy_spec tests/strategy_validation tests/adapter_registry
          tests/instrument_registry tests/strategy_compiler tests/backtest_jobs
          tests/runtime_events tests/backtest_runner tests/lifecycle tests/strategy_registry
          tests/promotions tests/web tests/ai_builder tests/integration tests/api tests/auth
          tests/workflow_spine
