name: test

on:
  push:
  pull_request:

jobs:
  python-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .[test]
      - run: python -m compileall -q packages services tests
      - name: Check pinned NautilusTrader runtime
        run: |
          python - <<'PY'
          from packages.backtest_runner.runtime_check import check_nautilus_runtime_version
          status = check_nautilus_runtime_version()
          if not status.is_match:
              raise SystemExit(status.message)
          PY
      - run: >-
          pytest tests/strategy_spec tests/strategy_validation tests/adapter_registry
          tests/instrument_registry tests/strategy_compiler tests/backtest_jobs
          tests/runtime_events tests/backtest_runner tests/lifecycle tests/strategy_registry
          tests/promotions tests/web tests/ai_builder tests/integration tests/api tests/auth
          tests/workflow_spine tests/artifact_store tests/catalog_datasets

  frontend-operator-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - working-directory: apps/web
        run: npm ci
      - working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - working-directory: apps/web
        run: npm run typecheck
      - working-directory: apps/web
        run: npm test
      - working-directory: apps/web
        run: npm run build
      - working-directory: apps/web
        run: npm run test:e2e
