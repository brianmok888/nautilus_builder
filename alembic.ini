# Alembic migration configuration for Nautilus Builder.
#
# Adoption Report §3.4 Phase 1 (baseline). This introduces Alembic alongside
# the existing custom migration runner (packages/postgres/migrations.py). The
# custom runner remains the source of truth for existing deployments; Alembic
# becomes the source of truth for NEW migrations after the baseline.
#
# Existing deployments should run `alembic stamp head` once to mark themselves
# as at-baseline without re-applying the 7 existing custom migrations.
#
# The Alembic version table is `alembic_version` (separate from the custom
# runner's `schema_migrations` table) so both systems can coexist during the
# dual-run transition window.

[alembic]
script_location = migrations
version_table = alembic_version

# Connection string is resolved at runtime from BUILDER_DATABASE_URL
# (or DATABASE_URL) in migrations/env.py — never hardcoded here.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
